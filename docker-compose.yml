version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avana_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-avana_it_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avana_user} -d ${POSTGRES_DB:-avana_it_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-avana_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-avana_it_db}?schema=public
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "npx prisma db push --accept-data-loss && npm start"

  frontend:
    build:
      context: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
